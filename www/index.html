<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family: sans-serif;
    padding: 10px;
}

textarea{
    width: 100%;
    height: 60vh;
    font-size: 18px;
}

.row{
    display: flex;
    gap: 10px;
    margin-top: 10px;
    margin-bottom: 10px;
}

button{
    flex: 1;
    padding: 12px;
    font-size: 18px;
}
</style>
</head>

<body>

<h2>Clipboard Sharing</h2>
<a href="./share.html">File Sharing</a>
<div class="row">
    <button onclick="sendText()">Send</button>
    <button onclick="copyServerClipboard()">Obtain</button>
    <button onclick="clearText()">Clear</button>
</div>
<textarea id="msg"></textarea>

<script>
function sendText(){
    let txt = document.getElementById("msg").value;

    fetch("/cgi-bin/send.sh", {
        method: "POST",
        headers: {
            "Content-Type": "text/plain"
        },
        body: txt
    })
    .then(r => r.text())
    .then(data => {
        console.log(data);
        alert("Sent!");
    });
}

async function copyServerClipboard() {
    try {
        const response = await fetch('/cgi-bin/clipboard.sh');
        const text = await response.text();

        // Fallback universal
        const ta = document.getElementById('msg');

        ta.value = text;
        ta.focus();
        ta.select();

        document.execCommand('copy');

        alert('Copied');
    } catch (e) {
        console.error(e);
        alert('Failed');
    }
}


function clearText(){
    document.getElementById("msg").value = "";
}
</script>

</body>
</html>
